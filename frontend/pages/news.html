<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>News & Updates — Dr. Abed-Nego Lamangin Bandim, MP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .news-card { display: grid; grid-template-columns: 200px 1fr; gap: 0; border-radius: var(--radius-lg); overflow:hidden; background:var(--white); box-shadow: var(--shadow-sm); border: 1px solid var(--border); transition: var(--transition); margin-bottom: 20px; }
    .news-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
    .news-card__thumb { background: linear-gradient(135deg, var(--green-dark), var(--green-mid)); display:flex; align-items:center; justify-content:center; font-size:3rem; color:rgba(255,255,255,0.3); min-height: 160px; }
    .news-card__body { padding: 22px 24px; }
    .news-card__date { font-size: 0.78rem; color: var(--text-light); font-weight:700; letter-spacing:0.05em; text-transform:uppercase; margin-bottom:8px; }
    .news-card__title { font-family: var(--font-head); font-size: 1.15rem; color: var(--green-dark); font-weight: 700; line-height:1.3; margin-bottom:10px; }
    .news-card__excerpt { font-size: 0.9rem; color: var(--text-mid); line-height:1.7; }
    .news-card__link { display:inline-flex; align-items:center; gap:6px; margin-top:14px; color:var(--green-mid); font-weight:700; font-size:0.88rem; transition:var(--transition); }
    .news-card__link:hover { gap:10px; color:var(--green-dark); }
    .pagination { display:flex; gap:8px; justify-content:center; margin-top:40px; flex-wrap:wrap; }
    .page-btn { padding:9px 18px; border:2px solid var(--border); border-radius: var(--radius); background:var(--white); font-weight:600; font-size:0.88rem; color:var(--text-mid); transition:var(--transition); }
    .page-btn:hover, .page-btn.active { background:var(--green-mid); color:var(--white); border-color:var(--green-mid); }
    @media(max-width:600px) { .news-card { grid-template-columns:1fr; } .news-card__thumb { min-height:120px; } }

    /* Modal */
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:2000; align-items:center; justify-content:center; padding:20px; }
    .modal-overlay.open { display:flex; }
    .modal { background:var(--white); border-radius:var(--radius-lg); max-width:720px; width:100%; max-height:90vh; overflow-y:auto; box-shadow:var(--shadow-lg); }
    .modal__header { padding:28px 32px 0; border-bottom:1px solid var(--border); }
    .modal__title { font-family:var(--font-head); font-size:1.5rem; color:var(--green-dark); line-height:1.3; padding-bottom:16px; }
    .modal__meta  { font-size:0.82rem; color:var(--text-light); padding-bottom:16px; }
    .modal__body  { padding:28px 32px; line-height:1.9; color:var(--text-mid); font-size:0.96rem; }
    .modal__close { float:right; background:none; font-size:1.5rem; color:var(--text-light); padding:4px 8px; transition:var(--transition); }
    .modal__close:hover { color:var(--text-dark); }
  </style>
  <style>
    /* ── FORCED NAVBAR FIX ── */
    header#navbar,
    header#navbar .navbar,
    .navbar {
      background-color: #0d2b1a !important;
      background: #0d2b1a !important;
    }
    .navbar__inner {
      display: flex !important;
      align-items: center !important;
      justify-content: space-between !important;
      height: 70px !important;
      max-width: 1140px !important;
      margin: 0 auto !important;
      padding: 0 20px !important;
    }
    .navbar__site-name { color: #ffffff !important; font-weight: 700 !important; }
    .navbar__site-name span { color: #e8c97a !important; }
    .navbar__links a { color: #ffffff !important; text-decoration: none !important; padding: 8px 14px !important; font-weight: 600 !important; }
    .navbar__links a:hover { color: #e8c97a !important; }
    .navbar__cta { background: #c9a84c !important; color: #0d2b1a !important; padding: 8px 18px !important; border-radius: 20px !important; font-weight: 700 !important; }
    .navbar__logo { border-color: #c9a84c !important; color: #c9a84c !important; background: #1a4a2e !important; }
    .navbar__hamburger span { background: #ffffff !important; }
    .navbar__mobile-menu { background: #0d2b1a !important; }
    .navbar__mobile-menu a { color: #ffffff !important; }
  </style>
</head>
<body>
  <header id="navbar"></header>

  <div class="page-hero">
    <h1>News &amp; Updates</h1>
    <p>The latest announcements and developments from Bunkpurugu.</p>
  </div>

  <section class="section">
    <div class="container" style="max-width:860px;">
      <div id="newsList"><div class="loading-wrap"><div class="spinner"></div></div></div>
      <div id="pagination" class="pagination"></div>
    </div>
  </section>

  <!-- Post modal -->
  <div class="modal-overlay" id="postModal">
    <div class="modal">
      <div class="modal__header">
        <button class="modal__close" id="modalClose">&times;</button>
        <h2 class="modal__title" id="modalTitle"></h2>
        <div class="modal__meta" id="modalMeta"></div>
      </div>
      <div class="modal__body" id="modalBody"></div>
    </div>
  </div>

  <footer id="footer" class="footer"></footer>
  <script src="/js/main.js"></script>
  <script>
    let currentPage = 1;
    const LIMIT = 6;

    async function loadNews(page = 1) {
      currentPage = page;
      const list = document.getElementById('newsList');
      list.innerHTML = '<div class="loading-wrap"><div class="spinner"></div></div>';

      const data = await apiFetch(`/posts?page=${page}&limit=${LIMIT}`);
      if (!data.success || !data.data.length) {
        list.innerHTML = `<div class="empty-state"><h3>No posts available</h3><p>Check back soon.</p></div>`;
        return;
      }

      list.innerHTML = data.data.map(p => `
        <article class="news-card" onclick="openPost(${p.id})" style="cursor:pointer;">
          <div class="news-card__thumb"></div>
          <div class="news-card__body">
            <div class="news-card__date">${formatDate(p.created_at)} ${p.author ? '&bull; ' + p.author : ''}</div>
            <h3 class="news-card__title">${p.title}</h3>
            <p class="news-card__excerpt">${truncate(stripHtml(p.content), 200)}</p>
            <span class="news-card__link">Read full story &rarr;</span>
          </div>
        </article>
      `).join('');

      // Pagination
      const totalPages = Math.ceil(data.total / LIMIT);
      const pag = document.getElementById('pagination');
      pag.innerHTML = '';
      for (let i = 1; i <= totalPages; i++) {
        const btn = document.createElement('button');
        btn.className = 'page-btn' + (i === page ? ' active' : '');
        btn.textContent = i;
        btn.onclick = () => loadNews(i);
        pag.appendChild(btn);
      }
    }

    async function openPost(id) {
      const data = await apiFetch(`/posts/${id}`);
      if (!data.success) return;
      const p = data.data;
      document.getElementById('modalTitle').textContent = p.title;
      document.getElementById('modalMeta').textContent  = `${formatDate(p.created_at)}${p.author ? ' · ' + p.author : ''}`;
      document.getElementById('modalBody').innerHTML    = p.content;
      document.getElementById('postModal').classList.add('open');
    }

    document.getElementById('modalClose').onclick = () => document.getElementById('postModal').classList.remove('open');
    document.getElementById('postModal').addEventListener('click', e => {
      if (e.target === document.getElementById('postModal')) document.getElementById('postModal').classList.remove('open');
    });

    document.addEventListener('DOMContentLoaded', () => loadNews(1));
  </script>
</body>
</html>
