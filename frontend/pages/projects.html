<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects — Dr. Abed-Nego Lamangin Bandim, MP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    /* ── FORCED NAVBAR FIX ── */
    header#navbar,
    header#navbar .navbar,
    .navbar {
      background-color: #0d2b1a !important;
      background: #0d2b1a !important;
    }
    .navbar__inner {
      display: flex !important;
      align-items: center !important;
      justify-content: space-between !important;
      height: 70px !important;
      max-width: 1140px !important;
      margin: 0 auto !important;
      padding: 0 20px !important;
    }
    .navbar__site-name { color: #ffffff !important; font-weight: 700 !important; }
    .navbar__site-name span { color: #e8c97a !important; }
    .navbar__links a { color: #ffffff !important; text-decoration: none !important; padding: 8px 14px !important; font-weight: 600 !important; }
    .navbar__links a:hover { color: #e8c97a !important; }
    .navbar__cta { background: #c9a84c !important; color: #0d2b1a !important; padding: 8px 18px !important; border-radius: 20px !important; font-weight: 700 !important; }
    .navbar__logo { border-color: #c9a84c !important; color: #c9a84c !important; background: #1a4a2e !important; }
    .navbar__hamburger span { background: #ffffff !important; }
    .navbar__mobile-menu { background: #0d2b1a !important; }
    .navbar__mobile-menu a { color: #ffffff !important; }
  </style>
</head>
<body>
  <header id="navbar"></header>

  <div class="page-hero">
    <h1>Development Projects</h1>
    <p>Investing in Bunkpurugu's future — community by community.</p>
  </div>

  <!-- Interactive Project Map -->
  <div class="container" style="margin-top: 40px; margin-bottom: -20px; position: relative; z-index: 10;">
    <h3 style="font-family: var(--font-head); font-size: 1.25rem; font-weight: 800; color: var(--green-dark); margin-bottom: 12px; display: flex; align-items: center; gap: 8px;">
      <span>🗺️</span> Bunkpurugu Development Map
    </h3>
    <div id="projectMap" style="height: 380px; border-radius: var(--radius-lg); border: 2px solid var(--border); box-shadow: var(--shadow-sm); background: #f0ede5; overflow: hidden;"></div>
  </div>

  <section class="section">
    <div class="container">

      <!-- Filter bar -->
      <div class="filter-bar" id="filterBar">
        <button class="filter-btn active" data-filter="">All Projects</button>
        <button class="filter-btn" data-filter="health">Health</button>
        <button class="filter-btn" data-filter="education">Education</button>
        <button class="filter-btn" data-filter="infrastructure">Infrastructure</button>
        <button class="filter-btn" data-filter="ict">ICT</button>
        <button class="filter-btn" data-filter="other">Other</button>
      </div>

      <!-- Status filter -->
      <div class="filter-bar" id="statusBar" style="margin-bottom: 36px;">
        <button class="filter-btn active" data-status="">All Statuses</button>
        <button class="filter-btn" data-status="ongoing">Ongoing</button>
        <button class="filter-btn" data-status="completed">Completed</button>
        <button class="filter-btn" data-status="planned">Planned</button>
      </div>

      <div id="projectsGrid" class="card-grid">
        <div class="loading-wrap"><div class="spinner"></div></div>
      </div>
    </div>
  </section>

  <footer id="footer" class="footer"></footer>
  <script src="/js/main.js"></script>
  <script>
    let activeCategory = '';
    let activeStatus   = '';
    let map;
    let markersLayer;

    function initMap() {
      if (map) return;
      // Bunkpurugu centered
      map = L.map('projectMap').setView([9.9610, -0.2650], 11);

      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
      }).addTo(map);

      markersLayer = L.layerGroup().addTo(map);
    }

    async function loadProjects() {
      const grid = document.getElementById('projectsGrid');
      grid.innerHTML = '<div class="loading-wrap"><div class="spinner"></div></div>';

      let url = '/projects?';
      if (activeCategory) url += `category=${activeCategory}&`;
      if (activeStatus)   url += `status=${activeStatus}&`;

      const data = await apiFetch(url);

      // Initialize map on first load or if not exists
      initMap();

      if (!data.success || !data.data.length) {
        grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><h3>No projects found</h3><p>Try a different filter.</p></div>`;
        if (markersLayer) markersLayer.clearLayers();
        return;
      }

      // Sync Leaflet Map Markers
      if (markersLayer) {
        markersLayer.clearLayers();
        data.data.forEach(p => {
          if (p.latitude && p.longitude) {
            const lat = parseFloat(p.latitude);
            const lng = parseFloat(p.longitude);
            const statusText = p.status.charAt(0).toUpperCase() + p.status.slice(1);
            const categoryText = p.category.charAt(0).toUpperCase() + p.category.slice(1);
            
            const popupContent = `
              <div style="font-family: 'Plus Jakarta Sans', sans-serif; min-width: 180px; padding: 4px;">
                <h4 style="font-family: 'Outfit', sans-serif; font-weight: 800; margin: 0 0 6px; color: var(--green-dark); font-size: 0.92rem; line-height: 1.3;">${p.title}</h4>
                <p style="margin: 0 0 8px; font-size: 0.78rem; line-height: 1.4; color: var(--text-mid);">${p.description.substring(0, 90)}...</p>
                <div style="font-size: 0.72rem; font-weight: 700; color: var(--text-light); margin-bottom: 4px;">📍 ${p.location || 'Bunkpurugu'}</div>
                <div style="display: flex; gap: 6px; font-size: 0.65rem; font-weight: 700; text-transform: uppercase;">
                  <span class="card__tag tag-${p.category}" style="margin:0; padding: 2px 6px;">${categoryText}</span>
                  <span class="status-badge status-${p.status}" style="margin:0; padding: 2px 6px;">${statusText}</span>
                </div>
              </div>
            `;
            
            L.marker([lat, lng]).bindPopup(popupContent).addTo(markersLayer);
          }
        });
      }

      grid.innerHTML = data.data.map(p => `
        <article class="card">
          <div class="card__image" style="background:var(--green-mid);color:rgba(255,255,255,0.3);font-size:2.5rem;height:180px;display:flex;align-items:center;justify-content:center;">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="opacity:0.35;"><path d="M20 20a2 2 0 0 0 .38-1.11L22 12h-6V8h-4V4H2v16h18z"/><rect x="6" y="12" width="4" height="8"/><rect x="12" y="12" width="4" height="8"/></svg>
          </div>
          <div class="card__body">
            <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;">
              ${categoryTag(p.category)}
              ${statusBadge(p.status)}
            </div>
            <h3 class="card__title">${p.title}</h3>
            <p class="card__text">${truncate(p.description, 180)}</p>
            <div class="card__meta" style="margin-top:14px;">${p.location || 'Bunkpurugu Constituency'}</div>
            <div class="card__meta">${formatDate(p.created_at)}</div>
          </div>
        </article>
      `).join('');
    }

    // Category filter
    document.getElementById('filterBar').addEventListener('click', e => {
      if (!e.target.classList.contains('filter-btn')) return;
      document.querySelectorAll('#filterBar .filter-btn').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      activeCategory = e.target.dataset.filter;
      loadProjects();
    });

    // Status filter
    document.getElementById('statusBar').addEventListener('click', e => {
      if (!e.target.classList.contains('filter-btn')) return;
      document.querySelectorAll('#statusBar .filter-btn').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      activeStatus = e.target.dataset.status;
      loadProjects();
    });

    document.addEventListener('DOMContentLoaded', loadProjects);
  </script>
</body>
</html>
