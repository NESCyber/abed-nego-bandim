<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Posts — Admin Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/admin.css">
  <style>
    /* ── FORCED NAVBAR FIX ── */
    header#navbar,
    header#navbar .navbar,
    .navbar {
      background-color: #0d2b1a !important;
      background: #0d2b1a !important;
    }
    .navbar__inner {
      display: flex !important;
      align-items: center !important;
      justify-content: space-between !important;
      height: 70px !important;
      max-width: 1140px !important;
      margin: 0 auto !important;
      padding: 0 20px !important;
    }
    .navbar__site-name { color: #ffffff !important; font-weight: 700 !important; }
    .navbar__site-name span { color: #e8c97a !important; }
    .navbar__links a { color: #ffffff !important; text-decoration: none !important; padding: 8px 14px !important; font-weight: 600 !important; }
    .navbar__links a:hover { color: #e8c97a !important; }
    .navbar__cta { background: #c9a84c !important; color: #0d2b1a !important; padding: 8px 18px !important; border-radius: 20px !important; font-weight: 700 !important; }
    .navbar__logo { border-color: #c9a84c !important; color: #c9a84c !important; background: #1a4a2e !important; }
    .navbar__hamburger span { background: #ffffff !important; }
    .navbar__mobile-menu { background: #0d2b1a !important; }
    .navbar__mobile-menu a { color: #ffffff !important; }
  </style>
</head>
<body>
<div class="admin-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="admin-main">
    <div class="topbar" id="topbar"></div>
    <div class="admin-content">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
        <h2 style="font-size:1.2rem;font-weight:700;">Manage Posts</h2>
        <button class="btn btn-primary" onclick="openPostModal()">+ New Post</button>
      </div>

      <div id="alertBox" class="alert" style="display:none;"></div>

      <div class="panel">
        <div id="postsTable"><div class="loading-wrap"><div class="spinner"></div></div></div>
      </div>
    </div>
  </div>
</div>

<!-- Create / Edit Modal -->
<div class="modal-overlay" id="postModal">
  <div class="modal">
    <div class="modal__header">
      <div class="modal__title" id="modalTitle">New Post</div>
      <button class="modal__close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal__body">
      <form id="postForm">
        <input type="hidden" id="postId">
        <div class="form-group">
          <label class="form-label" for="postTitle">Title <span>*</span></label>
          <input class="form-input" type="text" id="postTitle" placeholder="Post title" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="postImageUrl">Featured Image URL</label>
          <input class="form-input" type="url" id="postImageUrl" placeholder="https://...">
          <div class="form-hint">Paste a full image URL or upload via Media Manager.</div>
        </div>
        <div class="form-group">
          <label class="form-label" for="postContent">Content <span>*</span></label>
          <textarea class="form-textarea" id="postContent" style="min-height:200px;" placeholder="Write the full post content here…" required></textarea>
          <div class="form-hint">You may use basic HTML tags for formatting (e.g. &lt;b&gt;, &lt;p&gt;, &lt;br&gt;).</div>
        </div>
        <div class="form-group">
          <label class="form-label" for="postStatus">Status</label>
          <select class="form-select" id="postStatus">
            <option value="draft">Draft</option>
            <option value="published">Published</option>
          </select>
        </div>
      </form>
    </div>
    <div class="modal__footer">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="savePost()" id="saveBtn">Save Post</button>
    </div>
  </div>
</div>

<script src="/js/admin.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    injectAdminShell('posts');
    document.getElementById('topbarTitle').textContent = 'Manage Posts';
    loadPosts();
  });

  async function loadPosts() {
    const el = document.getElementById('postsTable');
    el.innerHTML = '<div class="loading-wrap"><div class="spinner"></div></div>';
    const data = await authFetch('/posts/admin/all');
    if (!data?.success || !data.data.length) {
      el.innerHTML = '<div class="empty-state"><h3>No posts yet</h3><p>Create your first post.</p></div>';
      return;
    }
    el.innerHTML = `<table class="data-table">
      <thead><tr><th>Title</th><th>Author</th><th>Status</th><th>Date</th><th>Actions</th></tr></thead>
      <tbody>
        ${data.data.map(p => `<tr>
          <td><strong>${truncate(p.title,50)}</strong></td>
          <td>${p.author || '—'}</td>
          <td><span class="badge badge-${p.status}">${p.status}</span></td>
          <td>${formatDate(p.created_at)}</td>
          <td style="display:flex;gap:6px;">
            <button class="btn btn-outline btn-sm" onclick="editPost(${p.id})">Edit</button>
            <button class="btn btn-danger btn-sm" onclick="deletePost(${p.id},'${p.title.replace(/'/g,"\\'")}')">Delete</button>
          </td>
        </tr>`).join('')}
      </tbody>
    </table>`;
  }

  function openPostModal(post = null) {
    document.getElementById('postId').value      = post?.id || '';
    document.getElementById('postTitle').value   = post?.title || '';
    document.getElementById('postContent').value = post?.content || '';
    document.getElementById('postImageUrl').value= post?.image_url || '';
    document.getElementById('postStatus').value  = post?.status || 'draft';
    document.getElementById('modalTitle').textContent = post ? 'Edit Post' : 'New Post';
    document.getElementById('postModal').classList.add('open');
  }
  function closeModal() { document.getElementById('postModal').classList.remove('open'); }

  async function editPost(id) {
    const data = await authFetch(`/posts/${id}`);
    if (data?.success) openPostModal(data.data);
  }

  async function savePost() {
    const id      = document.getElementById('postId').value;
    const payload = {
      title:     document.getElementById('postTitle').value.trim(),
      content:   document.getElementById('postContent').value.trim(),
      image_url: document.getElementById('postImageUrl').value.trim(),
      status:    document.getElementById('postStatus').value,
    };
    if (!payload.title || !payload.content) { alert('Title and content are required.'); return; }

    const btn = document.getElementById('saveBtn');
    btn.disabled = true; btn.textContent = 'Saving…';

    const method   = id ? 'PUT' : 'POST';
    const endpoint = id ? `/posts/${id}` : '/posts';
    const res = await authFetch(endpoint, { method, body: JSON.stringify(payload) });

    btn.disabled = false; btn.textContent = 'Save Post';
    showAlert(document.getElementById('alertBox'), res?.success ? 'success' : 'danger', res?.message || 'Error');
    if (res?.success) { closeModal(); loadPosts(); }
  }

  async function deletePost(id, title) {
    if (!confirmDelete(title)) return;
    const res = await authFetch(`/posts/${id}`, { method: 'DELETE' });
    showAlert(document.getElementById('alertBox'), res?.success ? 'success' : 'danger', res?.message);
    if (res?.success) loadPosts();
  }
</script>
</body>
</html>
